name: Build And Upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: Upstream Synapse version, for example 1.149.1
        required: true
        type: string
      tag:
        description: Git tag or release tag, defaults to v<version>
        required: false
        type: string
      series:
        description: Target Ubuntu series
        required: true
        default: all
        type: choice
        options:
          - all
          - noble
          - resolute
      update_state:
        description: Update versions/state.json after a successful upload
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - id: plan
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "${tag}" ]; then
            tag="v${{ inputs.version }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.series }}" = "all" ]; then
            matrix='{"include":[{"series":"noble"},{"series":"resolute"}]}'
          else
            matrix='{"include":[{"series":"${{ inputs.series }}"}]}'
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build_upload:
    needs: plan
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            devscripts \
            dh-virtualenv \
            dpkg-dev \
            dput-ng \
            fakeroot \
            libicu-dev \
            libpq-dev \
            libsystemd-dev \
            lsb-release \
            pkg-config \
            python3-dev \
            python3-pip \
            python3-setuptools \
            python3-venv \
            python3-wheel

      - uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}

      - name: Prepare source tree
        id: prepare
        run: |
          source_dir="$(python3 scripts/prepare_source.py \
            --version "${{ inputs.version }}" \
            --tag "${{ needs.plan.outputs.tag }}" \
            --series "${{ matrix.series }}")"
          echo "source_dir=${source_dir}" >> "$GITHUB_OUTPUT"

      - name: Vendor Python and Cargo dependencies
        run: python3 scripts/vendor_dependencies.py --source-dir "${{ steps.prepare.outputs.source_dir }}"

      - name: Build signed source package
        run: |
          bash scripts/build_source_package.sh \
            "${{ steps.prepare.outputs.source_dir }}" \
            "${{ secrets.LAUNCHPAD_GPG_KEY_ID }}" \
            "dist/${{ matrix.series }}"

      - name: Upload source package to Launchpad
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA }}
        run: |
          changes_file="$(find "dist/${{ matrix.series }}" -maxdepth 1 -name '*_source.changes' -print -quit)"
          bash scripts/upload_to_ppa.sh "${changes_file}" "${LAUNCHPAD_PPA}"

      - uses: actions/upload-artifact@v4
        with:
          name: source-package-${{ inputs.version }}-${{ matrix.series }}
          path: dist/${{ matrix.series }}

  update_state:
    needs:
      - plan
      - build_upload
    if: inputs.update_state && needs.build_upload.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update release state
        run: python3 scripts/update_state.py --state versions/state.json --version "${{ inputs.version }}" --tag "${{ needs.plan.outputs.tag }}"

      - name: Commit updated state
        run: |
          if git diff --quiet -- versions/state.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions/state.json
          git commit -m "Track upstream release ${{ inputs.version }}"
          git push
